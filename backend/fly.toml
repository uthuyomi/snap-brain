app = "snap-brain"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  FRONTEND_ORIGIN = "https://snap-brain.vercel.app"
  FRONTEND_ORIGINS = "https://snap-brain.vercel.app"
  SUPABASE_STORAGE_BUCKET = "memory-objects"
  ALLOW_DEV_USER_HEADER = "false"
  OPENAI_VISION_MODEL = "gpt-5.2"
  OPENAI_QUERY_MODEL = "gpt-5.2"
  OPENAI_EMBEDDING_MODEL = "text-embedding-3-large"
  OPENAI_EMBEDDING_DIMENSIONS = "1536"
  OPENAI_REQUEST_TIMEOUT_SECONDS = "60"
  OUTPUT_LANGUAGE = "ja"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
